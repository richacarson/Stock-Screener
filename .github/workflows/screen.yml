name: Run Stock Screener

on:
  workflow_dispatch:  # Manual trigger via gh workflow run

permissions:
  contents: write  # deploy.py force-pushes the built site to the gh-pages branch

jobs:
  screen:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run screener
        run: python main.py

      - name: Deploy to GitHub Pages
        env:
          GITHUB_PUSH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/deploy.py
