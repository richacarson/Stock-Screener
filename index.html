<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#0C1018">
    <title>IOWN Stock Screener</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;0,9..40,800;1,9..40,400&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0C1018;
            --surface: #121722;
            --card: #171D2A;
            --card-hover: #1E2536;
            --border: rgba(140,160,130,0.08);
            --border-hover: rgba(140,160,130,0.16);
            --border-active: rgba(140,160,130,0.28);
            --t1: #EDF0E8;
            --t2: #B0BDA0;
            --t3: #7A8E68;
            --t4: #3D4A32;
            --up: #34D399;
            --dn: #F87171;
            --accent: #8FA878;
            --accent-soft: rgba(143,168,120,0.10);
            --shadow: 0 2px 8px rgba(0,0,0,0.3);
            --rec-buy: #34D399; --rec-hold: #FBBF24; --rec-sell: #F87171; --rec-watch: #60A5FA;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: var(--bg);
            color: var(--t1);
            font-family: 'DM Sans', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            -webkit-font-smoothing: antialiased;
            line-height: 1.5;
        }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: rgba(110,132,80,0.15); border-radius: 4px; }
        ::selection { background: rgba(110,132,80,0.4); color: var(--t1); }

        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px 24px 40px;
        }

        header {
            padding: 20px 0;
            border-bottom: 1px solid var(--border);
            margin-bottom: 24px;
            text-align: center;
        }
        .logo-text {
            font-size: 36px;
            font-weight: 800;
            color: var(--t1);
            letter-spacing: 6px;
        }
        .logo-sub {
            font-size: 10px;
            font-weight: 700;
            color: var(--t4);
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 2px;
        }
        .header-stats {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 16px;
            font-size: 13px;
            color: var(--t3);
        }
        .header-stats strong { color: var(--accent); }

        /* Search */
        .search-wrap {
            margin-bottom: 24px;
        }
        .search-input {
            width: 100%;
            padding: 14px 20px;
            font-size: 15px;
            font-family: inherit;
            font-weight: 600;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--t1);
            outline: none;
            transition: border-color 0.15s;
        }
        .search-input::placeholder { color: var(--t4); }
        .search-input:focus { border-color: var(--accent); }

        /* Stock cards */
        .stock-list { display: flex; flex-direction: column; gap: 8px; }
        .stock-card {
            display: flex;
            align-items: center;
            padding: 16px 20px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            text-decoration: none;
            color: var(--t1);
            transition: border-color 0.15s, background 0.15s;
            gap: 16px;
        }
        .stock-card:hover {
            border-color: var(--border-active);
            background: var(--card-hover);
        }
        .stock-card-left {
            flex: 1;
            min-width: 0;
        }
        .stock-card-ticker {
            font-size: 18px;
            font-weight: 800;
            color: var(--accent);
        }
        .stock-card-name {
            font-size: 12px;
            color: var(--t3);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }
        .stock-card-meta {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sleeve-tag {
            font-size: 10px;
            font-weight: 700;
            color: var(--t3);
            background: var(--accent-soft);
            padding: 3px 8px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .rec-tag {
            font-size: 10px;
            font-weight: 800;
            padding: 3px 8px;
            border-radius: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .rec-tag.buy { background: rgba(52,211,153,0.12); color: var(--rec-buy); }
        .rec-tag.hold { background: rgba(251,191,36,0.12); color: var(--rec-hold); }
        .rec-tag.sell { background: rgba(248,113,113,0.12); color: var(--rec-sell); }
        .rec-tag.watch { background: rgba(96,165,250,0.12); color: var(--rec-watch); }

        .stock-card-score {
            text-align: right;
        }
        .score-big {
            font-size: 28px;
            font-weight: 800;
            color: var(--t1);
            line-height: 1;
        }
        .score-denom {
            font-size: 12px;
            color: var(--t4);
        }
        .stock-card-date {
            font-size: 10px;
            color: var(--t4);
            margin-top: 2px;
        }

        .no-results {
            text-align: center;
            padding: 40px;
            color: var(--t4);
            font-size: 14px;
            display: none;
        }

        footer {
            text-align: center;
            color: var(--t4);
            font-size: 11px;
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid var(--border);
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        @media (max-width: 640px) {
            .container { padding: 16px; }
            .logo-text { font-size: 28px; }
            .header-stats { flex-direction: column; gap: 4px; align-items: center; }
            .stock-card { padding: 12px 16px; }
            .stock-card-ticker { font-size: 16px; }
            .score-big { font-size: 22px; }
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .fade-in { animation: fadeIn 0.3s ease; }
    </style>
</head>
<body>
<div class="container fade-in">
    <header>
        <div class="logo-text">IOWN</div>
        <div class="logo-sub">Return on Intention &middot; Stock Screener</div>
        <div class="header-stats">
            <span><strong>1</strong> stocks screened</span>
            <span>Updated 2026-03-21</span>
        </div>
    </header>

    <div class="search-wrap">
        <input type="text" class="search-input" id="search" placeholder="Search by ticker or company name..." autocomplete="off" autofocus>
    </div>

    <div class="stock-list" id="stock-list">
        
        <a href="GIS.html" class="stock-card" data-ticker="gis" data-name="general mills, inc.">
            <div class="stock-card-left">
                <div class="stock-card-ticker">GIS</div>
                <div class="stock-card-name">General Mills, Inc.</div>
            </div>
            <div class="stock-card-meta">
                <span class="sleeve-tag">Prospect</span>
                <span class="rec-tag hold">HOLD</span>
            </div>
            <div class="stock-card-score">
                <span class="score-big">62</span><span class="score-denom">/100</span>
                <div class="stock-card-date">2026-03-09</div>
            </div>
        </a>
        
    </div>

    <div class="no-results" id="no-results">No stocks match your search.</div>

    <footer>
        Intentional Ownership &middot; For Investment Committee Use Only &middot; Not Investment Advice
    </footer>
</div>

<script>
    const search = document.getElementById('search');
    const cards = document.querySelectorAll('.stock-card');
    const noResults = document.getElementById('no-results');

    search.addEventListener('input', function() {
        const q = this.value.toLowerCase().trim();
        let visible = 0;
        cards.forEach(card => {
            const ticker = card.dataset.ticker;
            const name = card.dataset.name;
            const match = !q || ticker.includes(q) || name.includes(q);
            card.style.display = match ? '' : 'none';
            if (match) visible++;
        });
        noResults.style.display = visible === 0 ? 'block' : 'none';
    });
</script>
</body>
</html>
